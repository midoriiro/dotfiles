name: CI/CD Pipeline

on:
  push:
    branches: [ main, ci-cd-pipeline ]
  pull_request:
    branches: [ main, ci-cd-pipeline ]

permissions:
  contents: write
  actions: write

jobs:
  matrix:
    name: Matrix Definitions
    runs-on: ubuntu-latest
    outputs:
      project-result: ${{ steps.set-project-matrix.outputs.result }}
      result: ${{ steps.set-matrix.outputs.result }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            poexy-core:
              - 'tools/poexy-core/**'
            ignite:
              - 'tools/ignite/**'

      - name: Set Matrix
        id: set-matrix
        env:
          POEXY_CORE_PROJECT_CHANGED: ${{ steps.filter.outputs.poexy-core }}
          IGNITE_PROJECT_CHANGED: ${{ steps.filter.outputs.ignite }}
        shell: bash
        run: python .github/workflows/projects_matrix.py

  poetry-cicd:
    name: Poetry CI/CD - ${{ matrix.project.package-name }}
    needs: [matrix]
    strategy:
      matrix: 
        project: ${{ fromJSON(needs.matrix.outputs.result) }}
    uses: ./.github/workflows/poetry-cicd.yml
    with:
        supported-os: ${{ matrix.project.supported-os }}
        supported-python-versions: ${{ matrix.project.supported-python-versions }}
        last-supported-python-version: ${{ matrix.project.last-supported-python-version }}
        pipx-tools: ${{ matrix.project.pipx-tools }}
        poetry-project-path: ${{ matrix.project.path }}
        poetry-package-name: ${{ matrix.project.package-name }}
        poetry-dependency-groups: ${{ matrix.project.dependency-groups }}
        builds-registry-path: ${{ matrix.project.builds-registry-path }}
        builds-registry-key: ${{ matrix.project.builds-registry-key }}
        use-poexy-core: ${{ matrix.project.use-poexy-core == 'true' }}
        use-mutex: ${{ matrix.project.use-mutex == 'true' }}
        is-single-artifact: ${{ matrix.project.is-single-artifact == 'true' }}
    secrets:
      database-connection-uri: ${{ secrets.POSTGRESQL_CONNECTION_URI }}