name: CI/CD Pipeline

on:
  push:
    branches: [ main, ci-cd-pipeline ]
  pull_request:
    branches: [ main, ci-cd-pipeline ]

permissions:
  # required for github cli cache command
  # required for registry actions
  contents: read
  actions: write

jobs:
  python-matrix:
    name: (Python) Matrix Definition
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.set-matrix.outputs.result }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ignite:
              - 'tools/ignite/**'

  cicd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ignite:
              - 'tools/ignite/**'

      - name: CI/CD (Ignite))
        if: ${{ steps.filter.outputs.ignite }} == 'true'
        uses: ./.github/workflows/python-poetry-cicd.yml
        with:
            poetry-project-path: 'tools/ignite'
            poetry-package-name: 'ignite'
      
