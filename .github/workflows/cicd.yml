name: CI/CD Pipeline

on:
  push:
    branches: [ main, ci-cd-pipeline ]
    tags:
      - v*.*.*
  pull_request:
    branches: [ main, ci-cd-pipeline ]

env:
  PACKAGE_ARTIFACTS_REGISTRY: 'package-artifacts.json'

jobs:
  prepare-package-artifacts-registry:
    name: Prepare Package Artifacts Registry
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Package Artifacts File
        run: echo "[]" > ${{ env.PACKAGE_ARTIFACTS_REGISTRY }}

  matrix:
    name: Matrix Definition
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.set-matrix.outputs.result }}
    steps:
      - id: set-matrix
        shell: python
        run: |
          import json
          import os
          matrix = {
            "os": [
              'ubuntu-latest', 
              # 'windows-latest', 
              # 'macos-latest'
            ],
            "python-version": [
              # '3.9', 
              # '3.10', 
              # '3.11', 
              '3.12', 
              '3.13'
            ]
          }
          matrix_data = json.dumps(matrix)
          print(matrix_data)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"result={matrix_data}\n")
  ci:
    name: CI (${{ matrix.os }} - Python ${{ matrix.python-version }})
    needs: [matrix, prepare-package-artifacts-registry]
    strategy:
      matrix: ${{ fromJSON(needs.matrix.outputs.result) }}
    uses: ./.github/workflows/python-poetry-ci.yml
    with:
        os: ${{ matrix.os }}
        python-version: ${{ matrix.python-version }}
        poetry-project-path: 'tools/ignite'
        poetry-package-name: 'ignite'
  post-ci:
    name: Post CI
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Delivery
        run: echo "PACKAGE_ARTIFACTS=${{ needs.ci.outputs.package-artifacts }}"
  cd:
    name: CD
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Show Delivery Artifacts
        run: cat ${{ env.PACKAGE_ARTIFACTS_REGISTRY }}
      
