name: CI/CD Pipeline

on:
  push:
    branches: [ main, ci-cd-pipeline ]
  pull_request:
    branches: [ main, ci-cd-pipeline ]

jobs:
  mutex:
    name: Mutex Definitions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize Mutex
        uses: ./.github/actions/mutex/init
        with:
          database-connection-uri: ${{ secrets.POSTGRESQL_CONNECTION_URI }}

  matrix:
    name: Matrix Definitions
    runs-on: ubuntu-latest
    outputs:
      project-result: ${{ steps.set-project-matrix.outputs.result }}
      result: ${{ steps.set-matrix.outputs.result }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ignite:
              - 'tools/ignite/**'

      - name: Set Project Matrix
        id: set-project-matrix
        env:
          IGNITE_PROJECT_CHANGED: ${{ steps.filter.outputs.ignite }}
        shell: python
        run: |
          import json
          import os
          poetry_projects = []
          if '${{ env.IGNITE_PROJECT_CHANGED }}' == 'true':
            poetry_projects.append({
              'path': 'tools/ignite',
              'package-name': 'ignite',
              'builds-registry-path': 'builds/',
              'builds-registry-key': 'builds-ignite'
            })
          matrix_data = json.dumps(poetry_projects)
          print(matrix_data)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"result={matrix_data}\n")

      - name: Set Matrix
        id: set-matrix
        env:
          IGNITE_PROJECT_CHANGED: ${{ steps.filter.outputs.ignite }}
          PROJECT_MATRIX: ${{ steps.set-project-matrix.outputs.result }}
        shell: python
        run: |
          import json
          import os
          poetry_projects = json.loads('${{ env.PROJECT_MATRIX }}')
          matrix = {
            "poetry-projects": poetry_projects,
            "os": [
              'ubuntu-latest', 
              # 'windows-latest', 
              # 'macos-latest'
            ],
            "python-version": [
              '3.9', 
              '3.10', 
              '3.11', 
              '3.12', 
              '3.13'
            ]
          }
          matrix_data = json.dumps(matrix)
          print(matrix_data)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"result={matrix_data}\n")

  ci:
    name: CI - ${{ matrix.poetry-projects.package-name }} (${{ matrix.os }}-${{ matrix.python-version }})
    needs: [mutex, matrix]
    strategy:
      matrix: ${{ fromJSON(needs.matrix.outputs.result) }}
    uses: ./.github/workflows/python-poetry-ci.yml
    with:
        os: ${{ matrix.os }}
        python-version: ${{ matrix.python-version }}
        poetry-project-path: ${{ matrix.poetry-projects.path }}
        poetry-package-name: ${{ matrix.poetry-projects.package-name }}
        builds-registry-path: ${{ matrix.poetry-projects.builds-registry-path }}
        builds-registry-key: ${{ matrix.poetry-projects.builds-registry-key }}
    secrets:
      database-connection-uri: ${{ secrets.POSTGRESQL_CONNECTION_URI }}

  cd:
    name: CD - ${{ matrix.projects.package-name }}
    needs: [ci, matrix]
    strategy:
      matrix: 
        projects: ${{ fromJSON(needs.matrix.outputs.project-result) }}
    uses: ./.github/workflows/python-poetry-cd.yml
    with:
      python-version: '3.13'
      poetry-project-path: ${{ matrix.projects.path }}
      builds-registry-path: ${{ matrix.projects.builds-registry-path }}
      builds-registry-key: ${{ matrix.projects.builds-registry-key }}

  clean:
    if: always()
    name: Clean
    runs-on: ubuntu-latest
    needs: [ci, cd]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Clean Mutexes
        if: always()
        uses: ./.github/actions/mutex/clean
        with:
          database-connection-uri: ${{ secrets.POSTGRESQL_CONNECTION_URI }}

      - name: Clean Registries
        if: always()
        uses: ./.github/actions/registry/clean
        with:
          database-connection-uri: ${{ secrets.POSTGRESQL_CONNECTION_URI }}
      
