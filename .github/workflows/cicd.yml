name: CI/CD Pipeline

on:
  push:
    branches: [ main, ci-cd-pipeline ]
    tags:
      - v*.*.*
  pull_request:
    branches: [ main, ci-cd-pipeline ]

env:
  PACKAGE_ARTIFACTS: '[]'

jobs:
  matrix:
    name: Matrix Definition
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.set-matrix.outputs.result }}
    steps:
      - id: set-matrix
        shell: python
        run: |
          import json
          import os
          matrix = {
            "os": [
              'ubuntu-latest', 
              # 'windows-latest', 
              # 'macos-latest'
            ],
            "python-version": [
              # '3.9', 
              # '3.10', 
              # '3.11', 
              # '3.12', 
              '3.13'
            ]
          }
          matrix_data = json.dumps(matrix)
          print(matrix_data)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"result={matrix_data}\n")
  ci:
    name: CI (${{ matrix.os }} - Python ${{ matrix.python-version }})
    needs: [matrix]
    strategy:
      matrix: ${{ fromJSON(needs.matrix.outputs.result) }}
    uses: ./.github/workflows/python-poetry-ci.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      poetry-project-path: 'tools/ignite'
      poetry-package-name: 'ignite'

  prepare-package-artifacts:
    name: Prepare Package Artifacts Before Delivery
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Package Artifacts Before Delivery
        env:
          PACKAGE_ARTIFACTS: ${{ env.PACKAGE_ARTIFACTS }}
          ARTIFACTS_TO_ADD: ${{ needs.ci.outputs.package-artifacts }}
        shell: python
        run: |
          import json
          import os
          package_artifacts = json.loads(os.environ['PACKAGE_ARTIFACTS'])
          artifacts_to_add = json.loads(os.environ['ARTIFACTS_TO_ADD'])
          package_artifacts.append(artifacts_to_add)
          package_artifacts_data = json.dumps(package_artifacts)
          # Update the global environment variable
          with open(os.environ['GITHUB_ENV'], 'a') as f:
            f.write(f"PACKAGE_ARTIFACTS={package_artifacts_data}\n")

  show-package-artifacts:
    name: Show Package Artifacts
    needs: [prepare-package-artifacts]
    runs-on: ubuntu-latest
    steps:
      - name: Show Package Artifacts
        run: echo "PACKAGE_ARTIFACTS=${{ env.PACKAGE_ARTIFACTS }}"
