name: CI/CD Pipeline

on:
  push:
    branches: [ main, ci-cd-pipeline ]
  pull_request:
    branches: [ main, ci-cd-pipeline ]
  workflow_call:
    inputs:
      builds-registry-path:
        description: 'Path to the builds registry'
        required: false
        type: string
        default: 'builds/'
      builds-registry-key:
        description: 'Key to the builds registry'
        required: false
        type: string
        default: 'builds-registry'

permissions:
  # required for github cli cache command
  # required for registry actions
  contents: read
  actions: write

jobs:
  python-matrix:
    name: (Python) Matrix Definition
    runs-on: ubuntu-latest
    outputs:
      project-result: ${{ steps.set-project-matrix.outputs.result }}
      result: ${{ steps.set-matrix.outputs.result }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ignite:
              - 'tools/ignite/**'

      - name: Set Project Matrix
        id: set-project-matrix
        env:
          IGNITE_PROJECT_CHANGED: ${{ steps.filter.outputs.ignite }}
        shell: python
        run: |
          import json
          import os
          poetry_projects = []
          if '${{ env.IGNITE_PROJECT_CHANGED }}' == 'true':
            poetry_projects.append({
              'path': 'tools/ignite',
              'package-name': 'ignite'
            })
          matrix_data = json.dumps(poetry_projects)
          print(matrix_data)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"result={matrix_data}\n")

      - name: Set Matrix
        id: set-matrix
        env:
          IGNITE_PROJECT_CHANGED: ${{ steps.filter.outputs.ignite }}
          PROJECT_MATRIX: ${{ steps.set-project-matrix.outputs.result }}
        shell: python
        run: |
          import json
          import os
          poetry_projects = json.loads('${{ env.PROJECT_MATRIX }}')
          matrix = {
            "poetry-projects": poetry_projects,
            "os": [
              'ubuntu-latest', 
              # 'windows-latest', 
              # 'macos-latest'
            ],
            "python-version": [
              # '3.9', 
              # '3.10', 
              # '3.11', 
              '3.12', 
              '3.13'
            ]
          }
          matrix_data = json.dumps(matrix)
          print(matrix_data)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"result={matrix_data}\n")

  ci:
    name: CI - Python (${{ matrix.poetry-projects.package-name }}-${{ matrix.os }}-${{ matrix.python-version }})
    needs: [python-matrix]
    strategy:
      matrix: ${{ fromJSON(needs.python-matrix.outputs.result) }}
    uses: ./.github/workflows/python-poetry-ci.yml
    with:
        os: ${{ matrix.os }}
        python-version: ${{ matrix.python-version }}
        poetry-project-path: ${{ matrix.poetry-projects.path }}
        poetry-package-name: ${{ matrix.poetry-projects.package-name }}
        builds-registry-path: ${{ inputs.builds-registry-path }}
        builds-registry-key: ${{ inputs.builds-registry-key }}

  cd:
    name: CD - Python (${{ matrix.poetry-projects.package-name }})
    needs: [ci]
    strategy:
      matrix: ${{ fromJSON(needs.python-matrix.outputs.project-result) }}
    uses: ./.github/workflows/python-poetry-cd.yml
    with:
      python-version: ${{ matrix.python-version }}
      poetry-project-path: ${{ matrix.poetry-projects.path }}
      builds-registry-path: ${{ inputs.builds-registry-path }}
      builds-registry-key: ${{ inputs.builds-registry-key }}
      
