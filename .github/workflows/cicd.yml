name: CI/CD Pipeline

on:
  push:
    branches: [ main, ci-cd-pipeline ]
    tags:
      - v*.*.*
  pull_request:
    branches: [ main, ci-cd-pipeline ]

env:
  PACKAGE_ARTIFACTS_FILE: 'package-artifacts.json'

jobs:
  prepare-package-artifacts-file:
    name: Prepare Package Artifacts File
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Package Artifacts File
        run: echo "[]" > ${{ env.PACKAGE_ARTIFACTS_FILE }}

  matrix:
    name: Matrix Definition
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.set-matrix.outputs.result }}
    steps:
      - id: set-matrix
        shell: python
        run: |
          import json
          import os
          matrix = {
            "os": [
              'ubuntu-latest', 
              # 'windows-latest', 
              # 'macos-latest'
            ],
            "python-version": [
              # '3.9', 
              # '3.10', 
              # '3.11', 
              '3.12', 
              '3.13'
            ]
          }
          matrix_data = json.dumps(matrix)
          print(matrix_data)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"result={matrix_data}\n")
  ci:
    name: CI (${{ matrix.os }} - Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: [matrix, prepare-package-artifacts-file]
    strategy:
      matrix: ${{ fromJSON(needs.matrix.outputs.result) }}
    steps:
      - name: CI
        id: ci
        uses: ./.github/workflows/python-poetry-ci.yml
        with:
          os: ${{ matrix.os }}
          python-version: ${{ matrix.python-version }}
          poetry-project-path: 'tools/ignite'
      
      - name: Prepare Delivery
        env:
          PACKAGE_ARTIFACTS_FILE: ${{ env.PACKAGE_ARTIFACTS_FILE }}
          ARTIFACTS_TO_ADD: ${{ steps.ci.outputs.package-artifacts }}
        shell: python
        run: |
          import json
          import os
          with open(os.environ['PACKAGE_ARTIFACTS_FILE'], 'r') as f:
            package_artifacts = json.load(f)
          package_artifacts.append(os.environ['ARTIFACTS_TO_ADD'])
          with open(os.environ['PACKAGE_ARTIFACTS_FILE'], 'w') as f:
            json.dump(package_artifacts, f)
  cd:
    name: CD
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Show Delivery Artifacts
        run: cat ${{ env.PACKAGE_ARTIFACTS_FILE }}
      
