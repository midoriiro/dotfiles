name: CI/CD Pipeline

on:
  push:
    branches: [ main, ci-cd-pipeline ]
    tags:
      - v*.*.*
  pull_request:
    branches: [ main, ci-cd-pipeline ]
  workflow_dispatch:
    inputs:
      python-version:
        description: 'Python version to test'
        required: true
        default: '3.11'
        type: choice
        options:
          - '3.9'
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
      os:
        description: 'Operating system to test'
        required: true
        default: 'ubuntu-latest'
        type: choice
        options:
          - 'ubuntu-latest'
          - 'windows-latest'
          - 'macos-latest'

jobs:
  ci-cd:
    name: CICD (${{ matrix.os }} - Python ${{ matrix.python-version }})
    strategy:
      matrix:
        os: [
          'ubuntu-latest',
          # 'windows-latest',
          # 'macos-latest'
        ]
        python-version: [
          # '3.9', 
          # '3.10', 
          # '3.11', 
          # '3.12', 
          '3.13'
        ]    
    uses: ./.github/workflows/python-poetry-cicd.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      poetry-project-path: 'tools/ignite'
      poetry-package-name: 'ignite'
