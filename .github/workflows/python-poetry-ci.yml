name: Python Poetry CI Pipeline

on:
  workflow_call:
    inputs:
      os:
        description: 'Operating system to run on'
        required: true
        type: string
      python-version:
        description: 'Python version to use'
        required: true
        type: string
      poetry-project-path:
        description: 'Path to the Poetry project'
        required: true
        type: string
      poetry-package-name:
        description: 'Name of the Poetry package'
        required: true
        type: string
      builds-registry-path:
        description: 'Path to the builds registry'
        required: true
        type: string
      builds-registry-key:
        description: 'Key to the builds registry'
        required: true
        type: string
      use-poexy-core:
        description: 'Whether to use poexy-core'
        required: true
        type: boolean
        default: true
      use-mutex:
        description: 'Whether to use mutex'
        required: true
        type: boolean
        default: true
    secrets:
      database-connection-uri:
        description: 'Database connection URI for mutex'
        required: true

env:
  PYTHON_VERSION: ${{ inputs.python-version }}
  # Some composite actions related to Poetry are sensitive to working-directory,
  # to simplify access to them, Poetry project path need to be set via an
  # environment variable defined globally.
  POETRY_PROJECT_PATH: ${{ inputs.poetry-project-path }}
  POETRY_DEPENDENCY_GROUPS: main, dev, test
  USE_POEXY_CORE: ${{ inputs.use-poexy-core }}
  USE_MUTEX: ${{ inputs.use-mutex }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DATABASE_CONNECTION_URI: ${{ secrets.database-connection-uri }}

jobs:
  setup-environment:
    name: Setup Environment
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize Mutex
        uses: ./.github/actions/mutex/init

      - name: Setup Environment
        uses: ./.github/actions/python/setup-python-pipx-poetry
        with:
          pipx-tools: '["poetry"]'
          poetry-dependency-groups: ${{ env.POETRY_DEPENDENCY_GROUPS }}
        
