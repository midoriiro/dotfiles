  build:
    name: Build
    runs-on: ${{ inputs.os }}
    needs: [setup-environment]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/python/setup-python-pipx-poetry
        with:
          pipx-tools: '["poetry"]'
          poetry-dependency-groups: ${{ env.POETRY_DEPENDENCY_GROUPS }}

      - name: Bump Version
        uses: ./.github/actions/python/poetry/version  

      - name: Build Artifacts
        id: build-artifacts
        uses: ./.github/actions/python/poetry/build

      - name: Wait for Build Mutex Release
        uses: ./.github/actions/mutex/wait
        with:
          key: ${{ inputs.builds-registry-key }}
          timeout: 60

      - name: Restore Build Registry
        id: build-registry
        uses: ./.github/actions/registry/restore
        with:
          path: ${{ inputs.builds-registry-path }}
          key: ${{ inputs.builds-registry-key }}

      - name: Add Build Artifacts to Build Registry
        working-directory: ${{ steps.build-registry.outputs.path }}
        env: 
          BUILD_ARTIFACTS_REGISTRY_PATH: ${{ steps.build-artifacts.outputs.artifacts-registry-path }}
          BUILD_ARTIFACTS_REGISTRY_KEY: ${{ steps.build-artifacts.outputs.artifacts-registry-key }}
        shell: bash
        run: |
          touch "$BUILD_ARTIFACTS_REGISTRY_KEY"
          if [ -f "$BUILD_ARTIFACTS_REGISTRY_KEY" ]; then
            echo "$BUILD_ARTIFACTS_REGISTRY_PATH" > "$BUILD_ARTIFACTS_REGISTRY_KEY"
            echo "✅ Build artifacts added to registry"
          else
            echo "❌ Failed to add build artifacts to registry"
            exit 1
          fi

      - name: Release Build Mutex
        uses: ./.github/actions/mutex/release
        with:
          key: ${{ inputs.builds-registry-key }}

      - name: Save Build Registry
        uses: ./.github/actions/registry/save
        with:
          path: ${{ inputs.builds-registry-path }}
          key: ${{ inputs.builds-registry-key }}
          clean: true