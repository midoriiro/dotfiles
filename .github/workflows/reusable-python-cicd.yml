name: Reusable Python/Poetry CI/CD Pipeline

on:
  workflow_call:
    inputs:
      os:
        description: 'Operating system to run on'
        required: true
        type: string
        default: 'ubuntu-latest'
      python-version:
        description: 'Python version to use'
        required: true
        type: string
        default: '3.13'
      project-path:
        description: 'Path to the project'
        required: true
        type: string
      package-name:
        description: 'Name of the package'
        required: true
        type: string

jobs:
  # Unit tests - fast execution
  unit-tests:
    name: Unit Tests
    runs-on: ${{ inputs.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/python/setup-python-pipx-poetry
        with:
          python-version: ${{ inputs.python-version }}
          pipx-tools: '["poetry"]'
          poetry-project-path: ${{ inputs.project-path }}
          poetry-dependency-groups: '["main", "dev"]'

      - name: Run unit tests
        working-directory: ${{ inputs.project-path }}
        shell: bash
        run: |
          poetry run pytest tests/unit/ --verbose --tb=short --numprocesses=auto

  # Integration tests - slower but comprehensive
  integration-tests:
    name: Integration Tests
    runs-on: ${{ inputs.os }}
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/python/setup-python-pipx-poetry
        with:
          python-version: ${{ inputs.python-version }}
          pipx-tools: '["poetry"]'
          poetry-project-path: ${{ inputs.project-path }}
          poetry-dependency-groups: '["main", "dev"]'

      - name: Run integration tests
        working-directory: ${{ inputs.project-path }}
        shell: bash
        run: |
          poetry run pytest tests/integration/ --verbose --tb=short --numprocesses=auto

  # Full test suite with coverage
  full-tests:
    name: Full Test Suite with Coverage
    runs-on: ${{ inputs.os }}
    needs: [unit-tests, integration-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/python/setup-python-pipx-poetry
        with:
          python-version: ${{ inputs.python-version }}
          pipx-tools: '["poetry"]'
          poetry-project-path: ${{ inputs.project-path }}
          poetry-dependency-groups: '["main", "dev"]'

      - name: Run full test suite with coverage
        working-directory: ${{ inputs.project-path }}
        shell: bash
        run: |
          poetry run pytest tests/ --verbose --cov=${{ inputs.package-name }} --cov-report=xml --cov-report=term-missing --numprocesses=auto

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ${{ inputs.project-path }}/coverage.xml
          name: codecov-${{ inputs.package-name }}
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            ${{ inputs.project-path }}/coverage.xml

  # Build package
  build:
    name: Build Package
    runs-on: ${{ inputs.os }}
    needs: full-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/python/setup-python-pipx-poetry
        with:
          python-version: ${{ inputs.python-version }}
          pipx-tools: '["poetry"]'
          poetry-project-path: ${{ inputs.project-path }}
          poetry-dependency-groups: '["main", "dev"]'

      - name: Build packages
        working-directory: ${{ inputs.project-path }}
        shell: bash
        run: |
          poetry run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts-${{ inputs.os }}-${{ inputs.python-version }}
          path: |
            ${{ inputs.project-path }}/dist/*.whl
            ${{ inputs.project-path }}/dist/*.tar.gz

  # Code quality checks
  code-quality:
    name: Code Quality
    runs-on: ${{ inputs.os }}
    needs: full-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/python/setup-python-pipx-poetry
        with:
          python-version: ${{ inputs.python-version }}
          pipx-tools: '["poetry"]'
          poetry-project-path: ${{ inputs.project-path }}
          poetry-dependency-groups: '["main", "dev"]'
          
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .

      - name: Run linting
        working-directory: ${{ inputs.project-path }}
        shell: bash
        run: |
          poetry run flake8 ${{ inputs.project-path }}/${{ inputs.package-name }}/ tests/ --max-line-length=88 --extend-ignore=E203

      - name: Check code formatting
        working-directory: ${{ inputs.project-path }}
        shell: bash
        run: |
          poetry run black --check ${{ inputs.project-path }}/${{ inputs.package-name }}/ tests/

      - name: Check import sorting
        working-directory: ${{ inputs.project-path }}
        shell: bash
        run: |
          poetry run isort --check-only --diff ${{ inputs.project-path }}/${{ inputs.package-name }}/ tests/

      - name: Check coverage threshold
        working-directory: ${{ inputs.project-path }}
        shell: bash
        run: |
          # Check if coverage.xml exists
          if [ ! -f coverage.xml ]; then
            echo "❌ Error: coverage.xml not found"
            exit 1
          fi
          
          # Extract total coverage percentage using Python
          COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          total = float(root.get('line-rate', 0)) * 100
          print(f'{total:.2f}')
          ")
          
          echo "📊 Current coverage: ${COVERAGE}%"
          
          # Check if coverage meets threshold (95%)
          if (( $(echo "$COVERAGE < 95" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below threshold of 95%"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets threshold of 95%"
          fi 