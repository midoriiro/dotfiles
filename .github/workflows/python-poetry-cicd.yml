name: Python Poetry CI/CD Pipeline

on:
  push:
    branches: [ main, ci-cd-pipeline ]
    tags:
      - v*.*.*
  pull_request:
    branches: [ main, ci-cd-pipeline ]
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        type: string
        default: '3.13'
      poetry-project-path:
        description: 'Path to the Poetry project'
        required: true
        type: string
      poetry-package-name:
        description: 'Name of the Poetry package'
        required: true
        type: string
      builds-registry-path:
        description: 'Path to the builds registry'
        required: false
        type: string
        default: 'builds/'
      builds-registry-key:
        description: 'Key to the builds registry'
        required: false
        type: string
        default: 'builds-registry'

permissions:
  # required for github cli cache command
  # required for registry actions
  contents: read
  actions: write

jobs:
  matrix:
    name: Matrix Definition
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.set-matrix.outputs.result }}
    steps:
      - id: set-matrix
        shell: python
        run: |
          import json
          import os
          matrix = {
            "os": [
              'ubuntu-latest', 
              # 'windows-latest', 
              # 'macos-latest'
            ],
            "python-version": [
              # '3.9', 
              # '3.10', 
              # '3.11', 
              '3.12', 
              '3.13'
            ]
          }
          matrix_data = json.dumps(matrix)
          print(matrix_data)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"result={matrix_data}\n")
  ci:
    name: CI (${{ matrix.os }} - Python ${{ matrix.python-version }})
    needs: [matrix]
    strategy:
      matrix: ${{ fromJSON(needs.matrix.outputs.result) }}
    uses: ./.github/workflows/python-poetry-ci.yml
    with:
        os: ${{ matrix.os }}
        python-version: ${{ matrix.python-version }}
        poetry-project-path: ${{ inputs.poetry-project-path }}
        poetry-package-name: ${{ inputs.poetry-package-name }}
        builds-registry-path: ${{ inputs.builds-registry-path }}
        builds-registry-key: ${{ inputs.builds-registry-key }}

  cd:
    name: CD
    needs: [ci]
    uses: ./.github/workflows/python-poetry-cd.yml
    with:
      python-version: ${{ inputs.python-version }}
      poetry-project-path: ${{ inputs.poetry-project-path }}
      builds-registry-path: ${{ inputs.builds-registry-path }}
      builds-registry-key: ${{ inputs.builds-registry-key }}
      
