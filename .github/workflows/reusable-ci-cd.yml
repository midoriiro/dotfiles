name: Reusable CI Pipeline

on:
  workflow_call:
    inputs:
      os:
        description: 'Operating system to run on'
        required: true
        type: string
        default: 'ubuntu-latest'
      python-version:
        description: 'Python version to use'
        required: true
        type: string
        default: '3.13'

jobs:
  # Unit tests - fast execution
  unit-tests:
    name: Unit Tests
    runs-on: ${{ inputs.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          os: ${{ inputs.os }}
          python-version: ${{ inputs.python-version }}

      - name: Debug environment
        working-directory: tools/ignite
        run: |
          echo "=== Environment Debug ==="
          python --version
          poetry --version
          poetry show typer
          poetry show click
          echo "=== End Debug ==="

      - name: Run unit tests
        working-directory: tools/ignite
        run: |
          poetry run pytest tests/unit/ --verbose --tb=short --numprocesses=auto

  # Integration tests - slower but comprehensive
  integration-tests:
    name: Integration Tests
    runs-on: ${{ inputs.os }}
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          os: ${{ inputs.os }}
          python-version: ${{ inputs.python-version }}

      - name: Run integration tests
        working-directory: tools/ignite
        run: |
          poetry run pytest tests/integration/ --verbose --tb=short --numprocesses=auto

  # Full test suite with coverage
  full-tests:
    name: Full Test Suite with Coverage
    runs-on: ${{ inputs.os }}
    needs: [unit-tests, integration-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          os: ${{ inputs.os }}
          python-version: ${{ inputs.python-version }}

      - name: Run full test suite with coverage
        working-directory: tools/ignite
        run: |
          poetry run pytest tests/ --verbose --cov=ignite --cov-report=xml --cov-report=term-missing --numprocesses=auto

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: tools/ignite/coverage.xml
          name: codecov-ignite
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: |
            tools/ignite/coverage.xml

  # Build package
  build:
    name: Build Package
    runs-on: ${{ inputs.os }}
    needs: full-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          os: ${{ inputs.os }}
          python-version: ${{ inputs.python-version }}

      - name: Build packages
        working-directory: tools/ignite
        run: |
          poetry run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts-${{ inputs.os }}-${{ inputs.python-version }}
          path: |
            tools/ignite/dist/*.whl
            tools/ignite/dist/*.tar.gz

  # Code quality checks
  code-quality:
    name: Code Quality
    runs-on: ${{ inputs.os }}
    needs: full-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          os: ${{ inputs.os }}
          python-version: ${{ inputs.python-version }}

      - name: Download coverage artifacts
        uses: actions/download-artifact@v3
        with:
          name: coverage-report
          path: .

      - name: Run linting
        working-directory: tools/ignite
        run: |
          poetry run flake8 ignite/ tests/ --max-line-length=88 --extend-ignore=E203

      - name: Check code formatting
        working-directory: tools/ignite
        run: |
          poetry run black --check ignite/ tests/

      - name: Check import sorting
        working-directory: tools/ignite
        run: |
          poetry run isort --check-only --diff ignite/ tests/

      - name: Check coverage threshold
        working-directory: tools/ignite
        run: |
          # Check if coverage.xml exists
          if [ ! -f coverage.xml ]; then
            echo "❌ Error: coverage.xml not found"
            exit 1
          fi
          
          # Extract total coverage percentage using Python
          COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          total = float(root.get('line-rate', 0)) * 100
          print(f'{total:.2f}')
          ")
          
          echo "📊 Current coverage: ${COVERAGE}%"
          
          # Check if coverage meets threshold (95%)
          if (( $(echo "$COVERAGE < 95" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below threshold of 95%"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets threshold of 95%"
          fi 