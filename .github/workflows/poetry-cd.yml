name: Python Poetry CD Pipeline

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: true
        type: string
      pipx-tools:
        description: 'Pipx tools to install'
        required: true
        type: string
      poetry-project-path:
        description: 'Path to the Poetry project'
        required: true
        type: string
      poetry-dependency-groups:
        description: 'Dependency groups to install'
        required: true
        type: string
      builds-registry-path:
        description: 'Path to the builds registry'
        required: true
        type: string
      builds-registry-key:
        description: 'Key to the builds registry'
        required: true
        type: string
      is-single-artifact:
        description: 'Whether the package is a single artifact'
        required: true
        type: boolean
        default: false

env:
  PYTHON_VERSION: ${{ inputs.python-version }}
  # Some composite actions related to Poetry are sensitive to working-directory,
  # but to simplify access to them, Poetry project path need to be set via an
  # environment variable defined globally.
  POETRY_PROJECT_PATH: ${{ inputs.poetry-project-path }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
jobs:
  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Restore Artifacts Registry
        id: artifacts-registry
        uses: ./.github/actions/artifacts-registry/restore
        with:
          fail-on-cache-miss: true

      - name: Select Packages to Release
        working-directory: ${{ steps.artifacts-registry.outputs.path }}
        shell: bash
        run: |
          ls -l **/*

      - name: Save Artifacts Registry
        uses: ./.github/actions/artifacts-registry/save

  release:
    name: Release
    needs: [package]
    runs-on: ubuntu-latest
    # if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.base_ref == 'main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/python/setup-python-pipx-poetry
        with:
          pipx-tools: ${{ inputs.pipx-tools }}
          poetry-dependency-groups: ${{ inputs.poetry-dependency-groups }}

      - name: Restore Build Registry
        id: build-registry
        uses: ./.github/actions/registry/restore
        with:
          path: ${{ inputs.builds-registry-path }}
          key: ${{ inputs.builds-registry-key }}
          fail-on-cache-miss: true

      - name: List Build Registry
        run: |
          ls -la ${{ steps.build-registry.outputs.path }}/**/*

      - name: Bump Project Version
        uses: ./.github/actions/python/poetry/version  

      - name: Get Project Info
        id: info
        uses: ./.github/actions/python/poetry/info

      - name: Commit Version Changes
        shell: bash
        run: |
          PROJECT_NAME=${{ steps.info.outputs.project-name }}
          PROJECT_VERSION=${{ steps.info.outputs.project-version }}
          echo "name: $PROJECT_NAME"
          echo "version: $PROJECT_VERSION"
          echo "commiting as ${{ github.actor }}"
          # git config --local user.email "action@github.com"
          # git config --local user.name "GitHub Action"
