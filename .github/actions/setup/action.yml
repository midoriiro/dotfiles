name: 'Setup Environment'
description: 'Setup Python, Poetry and dependencies'

inputs:
  python-version:
    description: 'Python version to use'
    required: true
    default: '3.13'
  os:
    description: 'Operating system'
    required: true
    default: 'ubuntu-latest'

runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version }}

    - name: Generate pipx environment variables
      shell: bash
      run: |
        # Get user home directory
        HOME_DIR="$HOME"
        
        # Set pipx paths
        PIPX_HOME="$HOME_DIR/.local/pipx"
        PIPX_BIN_DIR="$PIPX_HOME/bin"
        
        # Create directories if they don't exist
        mkdir --parents "$PIPX_HOME"
        mkdir --parents "$PIPX_BIN_DIR"
        
        # Set environment variables
        echo "PIPX_HOME=$PIPX_HOME" >> $GITHUB_ENV
        echo "PIPX_BIN_DIR=$PIPX_BIN_DIR" >> $GITHUB_ENV
        
        # Add pipx bin directory to PATH
        echo "$PIPX_BIN_DIR" >> $GITHUB_PATH
        
        # Debug output
        echo "PIPX_HOME: $PIPX_HOME"
        echo "PIPX_BIN_DIR: $PIPX_BIN_DIR"
        echo "Github PATH: $GITHUB_PATH"

    - name: Cached pipx
      id: cached-pipx
      uses: actions/cache@v3
      with:
        path: |
          ${{ env.PIPX_HOME }}
          ${{ env.PIPX_BIN_DIR }}
        key: python-poetry-${{ runner.os }}-${{ inputs.python-version }}

    - name: Install pipx
      if: steps.cached-pipx.outputs.cache-hit != 'true'
      shell: bash
      run: |
        python -m pip install --user pipx
        python -m pipx ensurepath

    - name: Install Poetry
      if: steps.cached-pipx.outputs.cache-hit != 'true'
      env:
        PIPX_HOME: ${{ env.PIPX_HOME }}
        PIPX_BIN_DIR: ${{ env.PIPX_BIN_DIR }}
      shell: bash
      run: |
        pipx install poetry

    - name: Cache Poetry dependencies
      id: cached-poetry-dependencies
      uses: actions/cache@v3
      with:
        path: tools/ignite/.venv
        key: venv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('tools/ignite/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      shell: bash
      working-directory: tools/ignite
      run: poetry install --only=main,dev