name: 'Setup Environment'
description: 'Setup Python, Poetry and dependencies'

inputs:
  python-version:
    description: 'Python version to use'
    required: true
    default: '3.13'
  os:
    description: 'Operating system'
    required: true
    default: 'ubuntu-latest'

runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version }}

    - name: Generate pipx environment variables
      id: pipx-env
      shell: python
      run: |
        import os
        import pathlib

        # Use  proper paths for the current OS
        home = pathlib.Path.home()  
        pipx_home = home / ".local" / "pipx"
        pipx_bin_dir = pipx_home / "bin"

        python_lib_dir = pathlib.Path(os.__file__).parent
        
        # Set output variables for GitHub Actions
        env_file = os.getenv('GITHUB_ENV')

        with open(env_file, "a") as f:
            f.write(f"PIPX_HOME={pipx_home}\n")
            f.write(f"PIPX_BIN_DIR={pipx_bin_dir}\n")
            f.write(f"PYTHON_LIB_DIR={python_lib_dir}\n")

    - name: Install pipx
      if: steps.cache-python-poetry.outputs.cache-hit != 'true'
      shell: bash
      run: |
        python -m pip install --user pipx
        python -m pipx ensurepath

    - name: Load cached Python and Poetry
      id: cached-python-poetry
      uses: actions/cache@v3
      with:
        path: |
          ${{ env.PIPX_HOME }}
          ${{ env.PIPX_BIN_DIR }}
          ${{ env.PYTHON_LIB_DIR }}
        key: python-poetry-${{ runner.os }}-${{ inputs.python-version }}

    - name: Install Poetry
      # if: steps.cached-python-poetry.outputs.cache-hit != 'true'
      env:
        PIPX_HOME: ${{ env.PIPX_HOME }}
        PIPX_BIN_DIR: ${{ env.PIPX_BIN_DIR }}
      shell: bash
      run: |
        pipx install --force poetry

    - name: Debug ~/.local contents
      shell: bash
      run: |
        echo "=== ~/.local Directory Contents (Recursive) ==="
        echo "HOME: $HOME"
        echo ""
        if [ -d "$HOME/.local" ]; then
          echo "📁 ~/.local exists, showing contents:"
          find "$HOME/.local" -ls 2>/dev/null
        else
          echo "❌ ~/.local directory not found"
        fi
        echo ""
        echo "=== Current PATH ==="
        echo "$PATH" | tr ':' '\n'

    - name: Cache Python and Poetry
      uses: actions/cache@v3
      with:
        path: |
          ${{ env.PIPX_HOME }}
          ${{ env.PIPX_BIN_DIR }}
          ${{ env.PYTHON_LIB_DIR }}
        key: python-poetry-${{ runner.os }}-${{ inputs.python-version }}

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v3
      with:
        path: tools/ignite/.venv
        key: venv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('tools/ignite/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-poetry-dependencupies.outputs.cache-hit != 'true'
      shell: bash
      working-directory: tools/ignite
      run: poetry install --only=main,dev

    - name: Cache Python environment
      uses: actions/cache@v3
      with:
        path: tools/ignite/.venv
        key: venv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('tools/ignite/poetry.lock') }} 