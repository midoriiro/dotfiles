name: 'Setup Environment'
description: 'Setup Python, Poetry and dependencies'

inputs:
  python-version:
    description: 'Python version to use'
    required: true
    default: '3.13'
  os:
    description: 'Operating system'
    required: true
    default: 'ubuntu-latest'

runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install pipx
      shell: bash
      run: |
        python -m pip install --user pipx
        python -m pipx ensurepath

    - name: Load cached Python and Poetry
      id: cache-python-poetry
      uses: actions/cache@v3
      with:
        path: |
          ~/.local/venv/bin
          ~/.local/venv/poetry/bin/poetry
        key: python-poetry-${{ runner.os }}-${{ inputs.python-version }}

    - name: Install Poetry
      shell: bash
      run: |
        pipx install poetry

    - name: Cache Python and Poetry
      uses: actions/cache@v3
      with:
        path: |
          ~/.local/venv/bin
          ~/.local/venv/poetry/bin/poetry
        key: python-poetry-${{ runner.os }}-${{ inputs.python-version }}

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v3
      with:
        path: tools/ignite/.venv
        key: venv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('tools/ignite/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-poetry-dependencupies.outputs.cache-hit != 'true'
      shell: bash
      working-directory: tools/ignite
      run: poetry install --only=main,dev

    - name: Cache Python environment
      uses: actions/cache@v3
      with:
        path: tools/ignite/.venv
        key: venv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('tools/ignite/poetry.lock') }} 