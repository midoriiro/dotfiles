name: 'Setup Environment'
description: 'Setup Python, Poetry and dependencies'

inputs:
  python-version:
    description: 'Python version to use'
    required: true
    default: '3.13'
  os:
    description: 'Operating system'
    required: true
    default: 'ubuntu-latest'

runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache Python and Poetry
      id: cache-python-poetry
      uses: actions/cache@v3
      with:
        path: |
          ~/.local/bin/poetry
          ~/.local/lib/python*/site-packages/poetry*
          ~/.cache/pypoetry
          ${{ env.LOCALAPPDATA }}/pypoetry
          ${{ env.APPDATA }}/pypoetry
          ${{ env.RUNNER_TOOL_CACHE }}/Python
        key: python-poetry-${{ runner.os }}-${{ inputs.python-version }}

    - name: Install Poetry
      if: steps.cache-python-poetry.outputs.cache-hit != 'true'
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Add Poetry to PATH
      shell: bash
      run: |
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        echo "Poetry path added to GITHUB_PATH"

    - name: Verify Poetry installation
      shell: bash
      run: |
        poetry --version
        echo "Poetry is available at: $(which poetry)"

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v3
      with:
        path: tools/ignite/.venv
        key: venv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('tools/ignite/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      shell: bash
      working-directory: tools/ignite
      run: poetry install --only=main,dev

    - name: Cache Python environment
      uses: actions/cache@v3
      with:
        path: tools/ignite/.venv
        key: venv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('tools/ignite/poetry.lock') }} 