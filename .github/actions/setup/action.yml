name: 'Setup Environment'
description: 'Setup Python, Poetry and dependencies'

inputs:
  python-version:
    description: 'Python version to use'
    required: true
    default: '3.13'
  os:
    description: 'Operating system'
    required: true
    default: 'ubuntu-latest'

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Cache Poetry
      uses: actions/cache@v3
      with:
        path: |
          ~/.local/bin/poetry
          ~/.local/lib/python*/site-packages/poetry*
          ~/.cache/pypoetry
          ${{ env.LOCALAPPDATA }}/pypoetry
          ${{ env.APPDATA }}/pypoetry
        key: poetry-${{ runner.os }}-${{ inputs.python-version }}

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v3
      with:
        path: tools/ignite/.venv
        key: venv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('tools/ignite/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      shell: bash
      working-directory: tools/ignite
      run: poetry install --only=main,dev

    - name: Cache Python environment
      uses: actions/cache@v3
      with:
        path: tools/ignite/.venv
        key: setup-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('tools/ignite/poetry.lock') }} 