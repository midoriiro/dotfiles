name: 'Restore Package Registry'
description: 'Restore package registry from cache'

outputs:
  file:
    description: 'The path to the package registry file'
    value: ${{ steps.output.outputs.file }}

runs:
  using: composite
  steps:
    - name: Set environment variables
      uses: ./.github/actions/package-registry/set-env

    - name: Restore cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ env.REGISTRY_FILE }}
        key: package-registry-${{ github.workflow_sha }}

    - name: Show registry file
      env:
        REGISTRY_FILE: ${{ env.REGISTRY_FILE }}
      shell: bash
      run: |
        echo "Registry file located at: ${REGISTRY_FILE}"
        cat $REGISTRY_FILE

    - name: Set output
      id: output
      env:
        REGISTRY_FILE: ${{ env.REGISTRY_FILE }}
      shell: bash
      run: |
        echo "file=${REGISTRY_FILE}" >> $GITHUB_OUTPUT

    - name: Show output
      shell: bash
      run: |
        echo "Output: ${{ steps.output.outputs.file }}"