name: 'Poetry Build'
description: 'Build Python packages with Poetry'

outputs:
  artifacts-registry-path:
    description: 'Registry path where artifacts are saved'
    value: ${{ steps.artifacts-registry-path.outputs.path }}
  artifacts-registry-key:
    description: 'Registry key where artifacts are saved'
    value: ${{ steps.artifacts-registry-key.outputs.key }}

runs:
  using: composite
  steps:
    - name: Check Poetry Environment
      uses: ./.github/actions/python/poetry/check

    - name: Poetry Info
      id: poetry-info
      uses: ./.github/actions/python/poetry/info

    - name: Run Build
      working-directory: ${{ env.POETRY_PROJECT_PATH }}
      shell: bash
      run: |
        POETRY_CMD="poetry"
        POETRY_CMD="$POETRY_CMD build"
        echo "✅ Using default build command: $POETRY_CMD"
        $POETRY_CMD

    - name: Get Artifacts Registry Key
      id: artifacts-registry-key
      shell: bash
      run: |
        KEY="${{ runner.os }}-${{ env.PYTHON_VERSION }}"
        KEY="$KEY-${{ steps.poetry-info.outputs.project-name }}"
        KEY="$KEY-${{ steps.poetry-info.outputs.project-version }}"
        echo "key=artifacts-$KEY" >> $GITHUB_OUTPUT

    - name: Get Artifacts Registry Path
      id: artifacts-registry-path
      shell: bash
      run: |
        echo "path=${{ env.POETRY_PROJECT_PATH }}/dist" >> $GITHUB_OUTPUT

    - name: Restore Artifacts Registry
      id: artifacts-registry
      uses: ./.github/actions/registry/restore
      with:
        path: ${{ steps.artifacts-registry-path.outputs.path }}
        key: ${{ steps.artifacts-registry-key.outputs.key }}

    - name: Copy Artifacts
      working-directory: ${{ env.POETRY_PROJECT_PATH }}
      shell: bash
      run: |
        cp dist/*.whl ${{ steps.artifacts-registry.outputs.path }}/.
        cp dist/*.tar.gz ${{ steps.artifacts-registry.outputs.path }}/.

    - name: Save Artifacts
      id: save-artifacts
      uses: ./.github/actions/registry/save
      with:
        path: ${{ steps.artifacts-registry-path.outputs.path }}
        key: ${{ steps.artifacts-registry-key.outputs.key }}
        clean: true

    - name: Finalize
      shell: bash
      run: |
        echo "✅ Build artifacts to registry key: ${{ steps.save-artifacts.outputs.key }}"