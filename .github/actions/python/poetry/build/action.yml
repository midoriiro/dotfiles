name: 'Poetry Build'
description: 'Build Python packages with Poetry'

inputs:
  database-connection-uri:
    description: 'Database connection URI for mutex'
    required: true
    type: string

outputs:
  artifacts-registry-key:
    description: 'Registry key where artifacts are saved'
    value: ${{ steps.save-artifacts.outputs.key }}

runs:
  using: composite
  steps:
    - name: Check Poetry Environment
      uses: ./.github/actions/python/poetry/check

    - name: Poetry Info
      id: poetry-info
      uses: ./.github/actions/python/poetry/info

    - name: Run Build
      working-directory: ${{ env.POETRY_PROJECT_PATH }}
      shell: bash
      run: |
        POETRY_CMD="poetry"
        POETRY_CMD="$POETRY_CMD build"
        echo "✅ Using default build command: $POETRY_CMD"
        $POETRY_CMD

    - name: Save Artifacts
      id: save-artifacts
      uses: ./.github/actions/registry/save
      with:
        path: ${{ env.POETRY_PROJECT_PATH }}/dist
        key: artifacts-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ steps.poetry-info.outputs.project-name }}-${{ steps.poetry-info.outputs.project-version }}
        database-connection-uri: ${{ inputs.database-connection-uri }}
        clean: true

    - name: Finalize
      shell: bash
      run: |
        echo "✅ Build artifacts to registry key: ${{ steps.save-artifacts.outputs.key }}"