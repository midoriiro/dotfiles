name: 'Poetry Build'
description: 'Build Python packages with Poetry'

inputs:
  python-version:
    description: 'Python version to use'
    required: true
    type: string
  custom-build-command:
    description: 'Custom build command'
    required: false
    type: string


outputs:
  artifacts-name:
    description: 'Name of the build artifacts'
    value: ${{ steps.artifact-info.outputs.artifact-name }}

runs:
  using: composite
  steps:
    - name: Check if we are in a Poetry project
      working-directory: ${{ env.POETRY_PROJECT_PATH }}
      shell: bash
      run: |
        if [ ! -f "pyproject.toml" ]; then
          echo "❌ Error: Not in a Poetry project"
          exit 1
        fi

    - name: Check if poetry is installed
      shell: bash
      run: |
        if ! command -v poetry &> /dev/null; then
          echo "❌ Error: Poetry is not installed"
          exit 1
        fi

    - name: Poetry Info
      id: poetry-info
      uses: ./.github/actions/python/poetry-info

    - name: Artifact Info
      id: artifact-info
      env:
        PROJECT_NAME: ${{ steps.poetry-info.outputs.project-name }}
        PROJECT_VERSION: ${{ steps.poetry-info.outputs.project-version }}
      shell: bash
      run: |
        ARTIFACT_NAME=${PROJECT_NAME}-${PROJECT_VERSION}
        ARTIFACT_NAME=poetry-build-${{ runner.os }}-${{ inputs.python-version }}-$ARTIFACT_NAME
        echo "artifact-name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT

    - name: Run Build
      working-directory: ${{ env.POETRY_PROJECT_PATH }}
      env:
        CUSTOM_BUILD_COMMAND: ${{ inputs.custom-build-command }}
      shell: bash
      run: |
        POETRY_CMD="poetry"
        if [ -z "$CUSTOM_BUILD_COMMAND" ]; then
          POETRY_CMD="$POETRY_CMD build"
          echo "✅ Using default build command: $POETRY_CMD"
        else
          POETRY_CMD="$POETRY_CMD run $CUSTOM_BUILD_COMMAND"
          echo "✅ Using custom build command: $POETRY_CMD²" 
        fi
        $POETRY_CMD

    - name: Upload build artifacts
        id: upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-info.outputs.artifact-name }}
          path: |
            dist/*.whl
            dist/*.tar.gz