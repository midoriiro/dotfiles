name: 'Initialize Mutex'
description: 'Initialize Mutex'

runs:
  using: composite
  steps:
    - name: Set Mutex Environment
      id: mutex
      uses: ./.github/actions/mutex/set-env

    - name: Install AsyncPG
      if: ${{ steps.mutex.outputs.is-enabled == 'true' }}
      shell: bash
      run: |
        pip install asyncpg

    - name: Init Mutex Table
      if: ${{ steps.mutex.outputs.is-enabled == 'true' }}
      env:
        DATABASE_CONNECTION_URI: ${{ env.DATABASE_CONNECTION_URI }}
      working-directory: ${{ github.action_path }}
      shell: bash
      run: python main.py