name: 'Release Mutex Lock'
description: 'Release Mutex Lock'

inputs:
  key:
    description: 'Key of the mutex'
    required: true
    type: string 

secrets:
  access-token:
    description: 'A token passed from the caller'
    required: true

runs:
  using: composite
  steps:
    - name: Release Mutex
      env:
        LOCK_KEY: ${{ inputs.key }}
        GH_TOKEN: ${{ secrets.access-token }}
      shell: bash
      run: |
        gh api /repos/${{ github.repository }}/actions/variables/$LOCK_KEY \
          --method DELETE
        echo "✅ Mutex released with key '$LOCK_KEY'"