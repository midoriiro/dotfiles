name: 'Release Mutex Lock'
description: 'Release Mutex Lock'

inputs:
  key:
    description: 'Key of the mutex'
    required: true
    type: string 
  database-connection-uri:
    description: 'Database connection URI'
    required: true
    type: string

runs:
  using: composite
  steps:
    - name: Install AsyncPG
      shell: bash
      run: |
        pip install asyncpg

    - name: Release Mutex
      env:
        MUTEX_KEY: ${{ inputs.key }}
        DATABASE_CONNECTION_URI: ${{ inputs.database-connection-uri }}
        JOB_ID: ${{ github.job }}
        RUN_ID: ${{ github.run_id }}
      working-directory: ${{ github.action_path }}
      shell: bash
      run: |
        python main.py