name: 'Clean Mutex'
description: 'Clean Mutex'

inputs:
  database-connection-uri:
    description: 'Database connection URI'
    required: true
    type: string

runs:
  using: composite
  steps:
    - name: Install AsyncPG
      shell: bash
      run: |
        pip install asyncpg

    - name: Get Holder ID
      uses: ./.github/actions/core/unique-id
      id: holder-id
      with:
        job-id: false
        short-sha: false
        timestamp: false

    - name: Clean All Mutexes
      env:
        DATABASE_CONNECTION_URI: ${{ inputs.database-connection-uri }}
        HOLDER_ID: ${{ steps.holder-id.outputs.id }}
      working-directory: ${{ github.action_path }}
      shell: bash
      run: |
        python main.py