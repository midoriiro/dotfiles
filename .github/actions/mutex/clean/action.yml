name: 'Clean Mutex'
description: 'Clean Mutex'

inputs:
  database-connection-uri:
    description: 'Database connection URI'
    required: true
    type: string

runs:
  using: composite
  steps:
    - name: Install AsyncPG
      shell: bash
      run: |
        pip install asyncpg

    - name: Clean All Mutexes
      env:
        DATABASE_CONNECTION_URI: ${{ inputs.database-connection-uri }}
        JOB_ID: ${{ github.job }}
        RUN_ID: ${{ github.run_id }}
      working-directory: ${{ github.action_path }}
      shell: bash
      run: |
        python main.py