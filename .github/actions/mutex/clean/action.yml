name: 'Clean Mutex'
description: 'Clean Mutex'

runs:
  using: composite
  steps:
    - name: Set Mutex Environment
      uses: ./.github/actions/mutex/set-env
      id: mutex

    - name: Install AsyncPG
      if: ${{ steps.mutex.outputs.is-enabled == 'true' }}
      shell: bash
      run: |
        pip install asyncpg

    - name: Get Holder ID
      if: ${{ steps.mutex.outputs.is-enabled == 'true' }}
      uses: ./.github/actions/core/unique-id
      id: holder-id
      with:
        job-id: false
        short-sha: false
        timestamp: false

    - name: Clean All Mutexes
      if: ${{ steps.mutex.outputs.is-enabled == 'true' }}
      env:
        DATABASE_CONNECTION_URI: ${{ env.DATABASE_CONNECTION_URI }}
        HOLDER_ID: ${{ steps.holder-id.outputs.id }}
      working-directory: ${{ github.action_path }}
      shell: bash
      run: |
        python main.py