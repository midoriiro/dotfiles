name: 'Wait Mutex Lock Release'
description: 'Wait Mutex Lock Release'

inputs:
  key:
    description: 'Key of the mutex'
    required: true
    type: string
  timeout:
    description: 'Timeout in seconds'
    required: false
    type: number
    default: 60 

runs:
  using: composite
  steps:
    - name: Set Mutex Environment
      id: mutex
      uses: ./.github/actions/mutex/set-env

    - name: Install AsyncPG
      if: ${{ steps.mutex.outputs.is-enabled == 'true' }}
      shell: bash
      run: |
        pip install asyncpg

    - name: Get Holder ID
      if: ${{ steps.mutex.outputs.is-enabled == 'true' }}
      uses: ./.github/actions/core/unique-id
      id: holder-id
      with:
        timestamp: false

    - name: Wait for Mutex Key
      if: ${{ steps.mutex.outputs.is-enabled == 'true' }}
      env:
        MUTEX_KEY: ${{ inputs.key }}
        TIMEOUT: ${{ inputs.timeout }}
        DATABASE_CONNECTION_URI: ${{ env.DATABASE_CONNECTION_URI }}
        HOLDER_ID: ${{ steps.holder-id.outputs.id }}
      working-directory: ${{ github.action_path }}
      shell: bash
      run: |
        python main.py