name: 'Wait Mutex Lock Release'
description: 'Wait Mutex Lock Release'

inputs:
  key:
    description: 'Key of the mutex'
    required: true
    type: string
  timeout:
    description: 'Timeout in seconds'
    required: false
    type: number
    default: 60 
  access-token:
    description: 'GitHub personal access token to access GitHub API'
    required: true

runs:
  using: composite
  steps:
    - name: Format Mutex Key
      id: format-mutex-key
      uses: ./.github/actions/mutex/format-key
      with:
        key: ${{ inputs.key }}

    - name: Wait for Mutex Key
      env:
        MUTEX_KEY: ${{ steps.format-mutex-key.outputs.key }}
        TIMEOUT: ${{ inputs.timeout }}
        GH_TOKEN: ${{ inputs.access-token }}
      shell: bash
      run: |
        echo "🔍 Getting mutex with key '${{ env.MUTEX_KEY }}'"
        START_TIME=$(date +%s)
        ELAPSED_TIME=0
        
        # Try to acquire the mutex with retry logic
        while true; do
          # Check if mutex is already locked
          RESULT=$(gh variable get '${{ env.MUTEX_KEY }}' --json value --jq '.value' 2>/dev/null || echo '')

          echo "🔍 Mutex value: $RESULT"
          
          if [ -n "$RESULT" ]; then
            # Mutex is locked, wait and retry
            sleep 1
            CURRENT_TIME=$(date +%s)
            ELAPSED_TIME=$((CURRENT_TIME - START_TIME))
            if [ "$ELAPSED_TIME" -gt "$TIMEOUT" ]; then
              echo "❌ Timeout waiting for mutex to be released"
              exit 1
            fi
            echo "🔍 Mutex is locked, waiting... (${ELAPSED_TIME}s elapsed)"
            continue
          fi

          ACQUISITION_ID=$RANDOM
          
          # Try to acquire the mutex
          echo "🔒 Attempting to acquire mutex..."
          if gh variable set "${{ env.MUTEX_KEY }}" --body "$ACQUISITION_ID" 2>/dev/null; then
            RESULT=$(gh variable get '${{ env.MUTEX_KEY }}' --json value --jq '.value' 2>/dev/null || echo '')
            echo "🔍 Mutex value: $RESULT"
            if [ -n "$RESULT" && "$RESULT" == "$ACQUISITION_ID" ]; then
              # Successfully acquired the mutex
              echo "✅ Mutex acquired with key '${{ env.MUTEX_KEY }}'"
              break
            fi
            continue
          else
            # Failed to acquire, another job got it first
            echo "⚠️ Failed to acquire mutex, retrying..."
            sleep 1
            CURRENT_TIME=$(date +%s)
            ELAPSED_TIME=$((CURRENT_TIME - START_TIME))
            if [ "$ELAPSED_TIME" -gt "$TIMEOUT" ]; then
              echo "❌ Timeout waiting for mutex to be released"
              exit 1
            fi
          fi
        done