name: 'Wait Mutex Lock Release'
description: 'Wait Mutex Lock Release'

inputs:
  key:
    description: 'Key of the mutex'
    required: true
    type: string
  timeout:
    description: 'Timeout in seconds'
    required: false
    type: number
    default: 60 
  access-token:
    description: 'GitHub personal access token to access GitHub API'
    required: true

runs:
  using: composite
  steps:
    - name: Format Lock Key
      id: format-lock-key
      env:
        LOCK_KEY: ${{ inputs.key }}
      shell: python
      run: |
        import os

        lock_key = "${{ env.LOCK_KEY }}"

        for char in lock_key:
          if char.isalnum() == False and char != '_':
            lock_key = lock_key.replace(char, '_')
        
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
          f.write(f'key={lock_key}\n')

    - name: Wait for Lock Key
      env:
        LOCK_KEY: ${{ steps.format-lock-key.outputs.key }}
        TIMEOUT: ${{ inputs.timeout }}
        GH_TOKEN: ${{ inputs.access-token }}
      shell: bash
      run: |
        GET_LOCK_COMMAND='gh variable get $LOCK_KEY --jq ".name" 2>/dev/null || echo ""'

        START_TIME=$(date +%s)
        while [ -n "$($GET_LOCK_COMMAND)" ]; do
          sleep 1
          CURRENT_TIME=$(date +%s)
          ELAPSED_TIME=$((CURRENT_TIME - START_TIME))
          if [ "$ELAPSED_TIME" -gt "$TIMEOUT" ]; then
            echo "❌ Timeout waiting for lock file to be released"
            exit 1
          fi
        done

        if [ -n "$($GET_LOCK_COMMAND)" ]; then
          echo "✅ Mutex was not locked"
        else
          echo "✅ Mutex was released after $ELAPSED_TIME seconds"
        fi

        gh variable set "$LOCK_KEY" --body "true"

        echo "✅ Mutex acquired with key '$LOCK_KEY'"