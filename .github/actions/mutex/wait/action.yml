name: 'Wait Mutex Lock Release'
description: 'Wait Mutex Lock Release'

inputs:
  key:
    description: 'Key of the mutex'
    required: true
    type: string
  timeout:
    description: 'Timeout in seconds'
    required: false
    type: number
    default: 60 
  database-connection-uri:
    description: 'Database connection URI'
    required: true
    type: string

runs:
  using: composite
  steps:
    - name: Install AsyncPG
      shell: bash
      run: |
        pip install asyncpg

    - name: Get Holder ID
      uses: ./.github/actions/core/unique-id
      id: holder-id
      with:
        timestamp: false

    - name: Wait for Mutex Key
      env:
        MUTEX_KEY: ${{ inputs.key }}
        TIMEOUT: ${{ inputs.timeout }}
        DATABASE_CONNECTION_URI: ${{ inputs.database-connection-uri }}
        HOLDER_ID: ${{ steps.holder-id.outputs.id }}
      working-directory: ${{ github.action_path }}
      shell: bash
      run: |
        python main.py