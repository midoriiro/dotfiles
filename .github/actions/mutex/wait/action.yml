name: 'Wait Mutex Lock Release'
description: 'Wait Mutex Lock Release'

inputs:
  key:
    description: 'Key of the mutex'
    required: true
    type: string
  timeout:
    description: 'Timeout in seconds'
    required: false
    type: number
    default: 60 
  access-token:
    description: 'GitHub personal access token to access GitHub API'
    required: true

runs:
  using: composite
  steps:
    - name: Format Mutex Key
      id: format-mutex-key
      uses: ./.github/actions/mutex/format-key
      with:
        key: ${{ inputs.key }}

    - name: Wait for Mutex Key
      env:
        MUTEX_KEY: ${{ steps.format-mutex-key.outputs.key }}
        TIMEOUT: ${{ inputs.timeout }}
        GH_TOKEN: ${{ inputs.access-token }}
      shell: bash
      run: |
        echo "🔍 Getting mutex with key '${{ env.MUTEX_KEY }}'"
        RESULT=$(gh variable get '${{ env.MUTEX_KEY }}' --json name --jq '.name' 2>/dev/null || echo '')
        START_TIME=$(date +%s)
        ELAPSED_TIME=0
        while [ -n "$RESULT" ]; do
          sleep 1
          CURRENT_TIME=$(date +%s)
          ELAPSED_TIME=$((CURRENT_TIME - START_TIME))
          if [ "$ELAPSED_TIME" -gt "$TIMEOUT" ]; then
            echo "❌ Timeout waiting for mutex to be released"
            exit 1
          fi
          echo "🔍 Getting mutex with key '${{ env.MUTEX_KEY }}' again after $ELAPSED_TIME seconds"
          RESULT=$(gh variable get '${{ env.MUTEX_KEY }}' --json name --jq '.name' 2>/dev/null || echo '')
        done

        if [ "$ELAPSED_TIME" -eq 0 ]; then
          echo "✅ Mutex was not locked"
        else
          echo "✅ Mutex was released after $ELAPSED_TIME seconds"
        fi

        gh variable set "${{ env.MUTEX_KEY }}" --body "true"

        RESULT=$(gh variable get '${{ env.MUTEX_KEY }}' --json name --jq '.name' 2>/dev/null || echo '')
        echo "🔍 Result: $RESULT"

        echo "✅ Mutex acquired with key '${{ env.MUTEX_KEY }}'"