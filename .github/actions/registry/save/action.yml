name: 'Save Registry'
description: 'Save registry to cache'

inputs:
  path:
    description: 'Path to the registry'
    required: true
    type: string
  key:
    description: 'Key to the registry'
    required: true
    type: string
  delete-previous-cache:
    description: 'Whether to delete the previous cache'
    required: false
    type: boolean
    default: true

secrets:
  access-token:
    description: 'A token passed from the caller'
    required: true

outputs:
  path:
    description: 'Path to the registry'
    value: ${{ steps.registry.outputs.path }}
  key:
    description: 'Key to the registry'
    value: ${{ steps.registry.outputs.key }}  

runs:
  using: composite
  steps:
    - name: Set environment variables
      id: registry
      uses: ./.github/actions/registry/set-env
      with:
        path: ${{ inputs.path }}
        key: ${{ inputs.key }}

    - name: Wait for Mutex Release
      uses: ./.github/actions/mutex/wait
      with:
        key: ${{ inputs.key }}
        timeout: 60

    - name: Delete Previous Cache
      if: ${{ inputs.delete-previous-cache == 'true' }}
      env:
        CACHE_KEY: ${{ steps.registry.outputs.key }}
        GH_TOKEN: ${{ secrets.access-token }}
      shell: bash
      run: |
        gh cache delete "${{ env.CACHE_KEY }}" || exit 0

    - name: Save cache
      uses: actions/cache/save@v4
      with:
        path: ${{ steps.registry.outputs.path }}
        key: ${{ steps.registry.outputs.key }}

    - name: Release Mutex
      if: always()
      uses: ./.github/actions/mutex/release
      with:
        key: ${{ inputs.key }}