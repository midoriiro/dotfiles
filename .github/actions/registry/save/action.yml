name: 'Save Registry'
description: 'Save registry to cache'

inputs:
  path:
    description: 'Path to the registry'
    required: true
    type: string
  key:
    description: 'Key to the registry'
    required: true
    type: string
  delete-previous-cache:
    description: 'Whether to delete the previous cache'
    required: false
    type: boolean
    default: true

outputs:
  path:
    description: 'Path to the registry'
    value: ${{ steps.registry.outputs.path }}
  key:
    description: 'Key to the registry'
    value: ${{ steps.registry.outputs.key }}  

runs:
  using: composite
  steps:
    - name: Set environment variables
      id: registry
      uses: ./.github/actions/registry/set-env
      with:
        path: ${{ inputs.path }}
        key: ${{ inputs.key }}

    - name: Delete Previous Cache
      if: ${{ inputs.delete-previous-cache == 'true' }}
      continue-on-error: true
      env:
        CACHE_KEY: ${{ steps.registry.outputs.key }}
        GH_TOKEN: ${{ env.GITHUB_TOKEN }}
      shell: bash
      run: |
        gh extension install actions/gh-actions-cache
        gh actions-cache delete "${{ env.CACHE_KEY }}" --confirm

    - name: Save cache
      uses: actions/cache/save@v4
      with:
        path: ${{ steps.registry.outputs.path }}
        key: ${{ steps.registry.outputs.key }}