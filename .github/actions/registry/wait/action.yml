name: 'Wait Registry Lock Release'
description: 'Wait Registry Lock Release'

inputs:
  path:
    description: 'Path to the registry'
    required: true
    type: string
  key:
    description: 'Key to the registry'
    required: true
    type: string
  timeout:
    description: 'Timeout in seconds'
    required: false
    type: number
    default: 60 

runs:
  using: composite
  steps:
    - name: Set Environment Variables
      id: registry
      uses: ./.github/actions/registry/set-env
      with:
        path: ${{ inputs.path }}
        key: ${{ inputs.key }}

    - name: Restore Locks Cache
      id: registry-locks
      uses: actions/cache/restore@v4
      with:
        path: ${{ steps.registry.outputs.locks-path }}
        key: registry-locks

    - name: Wait for Lock File
      id: wait-for-lock-file
      env:
        LOCK_FILE: ${{ steps.registry.outputs.lock }}
        TIMEOUT: ${{ inputs.timeout }}
      shell: bash
      run: |
        START_TIME=$(date +%s)
        while [ -f "$LOCK_FILE" ]; do
          sleep 1
          CURRENT_TIME=$(date +%s)
          ELAPSED_TIME=$((CURRENT_TIME - START_TIME))
          if [ "$ELAPSED_TIME" -gt "$TIMEOUT" ]; then
            echo "❌ Timeout waiting for lock file to be released"
            exit 1
          fi
        done
        if [ ! -f "$LOCK_FILE" ]; then
          echo "✅ Lock file was not locked"
        else
          echo "✅ Lock file was released after $ELAPSED_TIME seconds"
        fi
        touch "$LOCK_FILE"
        echo "✅ Lock file acquired at $LOCK_FILE"
    
    - name: Save Locks Cache
      uses: actions/cache/save@v4
      with:
        path: ${{ steps.registry.outputs.locks-path }}
        key: ${{ steps.registry-locks.outputs.cache-primary-key }}
        