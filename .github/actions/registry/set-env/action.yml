name: 'Set Registry Environment Variables'
description: 'Set registry environment variables'

inputs:
  path:
    description: 'Path to the registry'
    required: true
    type: string
  key:
    description: 'Key to the registry'
    required: true
    type: string

outputs:
  path:
    description: 'The path to the registry'
    value: ${{ steps.registry.outputs.path }}
  key:
    description: 'The cache key for the registry'
    value: ${{ steps.registry.outputs.key }}
  locks-path:
    description: 'The path to the locks cache'
    value: ${{ steps.registry.outputs.locks-path }}
  locks-key:
    description: 'The cache key for the locks cache'
    value: ${{ steps.registry.outputs.locks-key }}
  lock:
    description: 'The lock file for the registry'
    value: ${{ steps.registry.outputs.lock }}

runs:
  using: composite
  steps:
    - name: Get home directory path
      uses: ./.github/actions/core/get-home-directory
      id: home-directory

    - name: Generate environment variables
      id: registry
      env:
        HOME_DIR: ${{ steps.home-directory.outputs.path }}
        REGISTRY_KEY: ${{ inputs.key }}
        REGISTRY_PATH: ${{ inputs.path }}
      shell: bash
      run: |        
        # Set paths
        REGISTRY_HOME="$HOME_DIR/.local/registry"
        REGISTRY_PATH="$REGISTRY_HOME/${{ env.REGISTRY_PATH }}"
        REGISTRY_KEY="registry-${{ env.REGISTRY_KEY }}-${{ github.workflow_sha }}"
        REGISTRY_LOCKS_PATH="$REGISTRY_HOME/locks"
        REGISTRY_LOCKS_KEY="registry-locks"
        REGISTRY_LOCK_FILE="$REGISTRY_LOCKS_PATH/$REGISTRY_KEY.lock"
        
        # Create directories if they don't exist
        mkdir --parents "$REGISTRY_PATH"
        mkdir --parents "$REGISTRY_LOCKS_PATH"
        
        # Set environment variables
        echo "path=$REGISTRY_PATH" >> $GITHUB_OUTPUT
        echo "key=$REGISTRY_KEY" >> $GITHUB_OUTPUT
        echo "locks-path=$REGISTRY_LOCKS_PATH" >> $GITHUB_OUTPUT
        echo "locks-key=$REGISTRY_LOCKS_KEY" >> $GITHUB_OUTPUT
        echo "lock=$REGISTRY_LOCK_FILE" >> $GITHUB_OUTPUT

        # Debug output
        echo "✅ REGISTRY_HOME: $REGISTRY_HOME"
        echo "✅ REGISTRY_PATH: $REGISTRY_PATH"
        echo "✅ REGISTRY_KEY: $REGISTRY_KEY"
        echo "✅ REGISTRY_LOCKS_PATH: $REGISTRY_LOCKS_PATH"
        echo "✅ REGISTRY_LOCKS_KEY: $REGISTRY_LOCKS_KEY"
        echo "✅ REGISTRY_LOCK_FILE: $REGISTRY_LOCK_FILE"